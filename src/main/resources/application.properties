spring.application.name=converse-ai

# --- H2 / JPA ---
spring.datasource.url=jdbc:h2:mem:converseai
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Ensure schema is created before running data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- Mock LLM ---
mock.llm.failureRate=0.2
mock.llm.minLatencyMs=50
mock.llm.maxLatencyMs=1500

# --- Resilience4j ---
resilience4j.retry.instances.llmClient.maxAttempts=3
resilience4j.retry.instances.llmClient.waitDuration=500ms
resilience4j.timelimiter.instances.llmClient.timeoutDuration=2s
resilience4j.circuitbreaker.instances.llmClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.llmClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.llmClient.waitDurationInOpenState=10s
